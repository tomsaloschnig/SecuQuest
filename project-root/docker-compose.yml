services:
  postgres:
    image: postgres:16
    container_name: secuquest-postgres
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-secuquest}
      POSTGRES_USER: ${POSTGRES_USER:-secuquest_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secuquest_password}
    ports:
      - "5432:5432"
    volumes:
      - secuquest_postgres_data_realistic_v2:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - secuquest-network

  user-service:
    build:
      context: ./src/user-service
    container_name: secuquest-user-service
    restart: unless-stopped
    env_file:
      - .env.example
    ports:
      - "5001:5000"
    depends_on:
      - postgres
    networks:
      - secuquest-network

  phishing-service:
    build:
      context: ./src/phishing-service
    container_name: secuquest-phishing-service
    restart: unless-stopped
    env_file:
      - .env.example
    ports:
      - "5002:5000"
    depends_on:
      - postgres
    networks:
      - secuquest-network

  scoring-service:
    build:
      context: ./src/scoring-service
    container_name: secuquest-scoring-service
    restart: unless-stopped
    env_file:
      - .env.example
    ports:
      - "5003:5000"
    depends_on:
      - postgres
    networks:
      - secuquest-network

  frontend:
    build:
      context: ./src/frontend
    container_name: secuquest-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - user-service
      - phishing-service
      - scoring-service
    networks:
      - secuquest-network

volumes:
  secuquest_postgres_data_realistic_v2:

networks:
  secuquest-network:
    driver: bridge
